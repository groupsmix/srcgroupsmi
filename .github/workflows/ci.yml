name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Type-check Astro
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Check Astro build
        run: npm run build

      - name: Reject console.log in Cloudflare Functions
        run: |
          echo "Checking for console.log usage in functions/ ..."
          files=$(grep -r "console\.log" functions/ --include="*.js" -l || true)
          if [ -n "$files" ]; then
            echo "::error::console.log found in server functions — use console.error/warn instead:"
            echo "$files"
            exit 1
          fi
          echo "No console.log found in functions/"
