name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Test (shared) ──────────────────────────────────────────
  ci:
    uses: groupsmix/shared-workflows/.github/workflows/ci.yml@main
    with:
      language: node
      node-version: "22"
      package-manager: npm

  # ── Type-check + Formatter (shared) ──────────────────────────────
  quality:
    uses: groupsmix/shared-workflows/.github/workflows/code-quality.yml@main
    with:
      language: node
      node-version: "22"
      package-manager: npm
      run-formatter: false          # Biome handles formatting via lint
      run-typecheck: true
      typecheck-command: "npm run check"

  # ── Astro build (shared) ─────────────────────────────────────────
  build:
    needs: [ci, quality]
    uses: groupsmix/shared-workflows/.github/workflows/build.yml@main
    with:
      language: node
      node-version: "22"
      package-manager: npm

  # ── Security audit (shared) ──────────────────────────────────────
  security:
    uses: groupsmix/shared-workflows/.github/workflows/security.yml@main
    with:
      language: node
      node-version: "22"
      package-manager: npm
      run-codeql: false
      severity-threshold: high

  # ── Auto-label PRs (shared) ─────────────────────────────────────
  label:
    if: github.event_name == 'pull_request'
    uses: groupsmix/shared-workflows/.github/workflows/label.yml@main
    with:
      use-default-config: true

  # ── Custom: reject console.log in Cloudflare Functions ───────────
  no-console-log:
    name: Reject console.log
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for console.log in functions/
        run: |
          echo "Checking for console.log usage in functions/ ..."
          files=$(grep -r "console\.log" functions/ --include="*.js" -l || true)
          if [ -n "$files" ]; then
            echo "::error::console.log found in server functions — use console.error/warn instead:"
            echo "$files"
            exit 1
          fi
          echo "No console.log found in functions/"
