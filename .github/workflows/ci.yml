name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Third-party and shared workflows are pinned to full commit SHAs so that
# retagging a branch or tag cannot silently ship a new workflow into CI.
# To bump a pinned SHA: fetch the latest commit on the upstream ref and
# update the SHA + the trailing `# v…` comment together.

jobs:
  # ── Lint + Test (shared) ──────────────────────────────────────────
  ci:
    uses: groupsmix/shared-workflows/.github/workflows/ci.yml@11d9ced857bec31af2198c798acbb5bfcb7f83da # pinned to groupsmix/shared-workflows main @ 2026-04
    with:
      language: node
      node-version: "22"
      package-manager: npm

  # ── Type-check + Formatter (shared) ──────────────────────────────
  quality:
    uses: groupsmix/shared-workflows/.github/workflows/code-quality.yml@11d9ced857bec31af2198c798acbb5bfcb7f83da # pinned to groupsmix/shared-workflows main @ 2026-04
    with:
      language: node
      node-version: "22"
      package-manager: npm
      run-formatter: false          # Biome handles formatting via lint
      run-typecheck: true
      typecheck-command: "npm run check"

  # ── Astro build (shared) ─────────────────────────────────────────
  build:
    needs: [ci, quality]
    uses: groupsmix/shared-workflows/.github/workflows/build.yml@11d9ced857bec31af2198c798acbb5bfcb7f83da # pinned to groupsmix/shared-workflows main @ 2026-04
    with:
      language: node
      node-version: "22"
      package-manager: npm

  # ── Security audit (shared) ──────────────────────────────────────
  security:
    uses: groupsmix/shared-workflows/.github/workflows/security.yml@11d9ced857bec31af2198c798acbb5bfcb7f83da # pinned to groupsmix/shared-workflows main @ 2026-04
    with:
      language: node
      node-version: "22"
      package-manager: npm
      run-codeql: false
      severity-threshold: high

  # ── Auto-label PRs (shared) ─────────────────────────────────────
  label:
    if: github.event_name == 'pull_request'
    uses: groupsmix/shared-workflows/.github/workflows/label.yml@11d9ced857bec31af2198c798acbb5bfcb7f83da # pinned to groupsmix/shared-workflows main @ 2026-04
    with:
      use-default-config: true

  # ── Custom: reject console.log in Cloudflare server code ─────────
  no-console-log:
    name: Reject console.log
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for console.log in functions/ and src/worker.js
        run: |
          echo "Checking for console.log usage in server code ..."
          files=$(grep -r "console\.log" functions/ src/worker.js --include="*.js" -l 2>/dev/null || true)
          if [ -n "$files" ]; then
            echo "::error::console.log found in server code — use console.error/warn instead:"
            echo "$files"
            exit 1
          fi
          echo "No console.log found in server code"

  # ── Custom: every SECURITY DEFINER function must pin search_path ─
  # SECURITY DEFINER bodies run as the function owner. If search_path
  # is not pinned, a caller can plant shadow objects in another schema
  # and hijack unqualified references. Enforcing `SET search_path = ...`
  # on every definer function is part of Epic F (F-1 / F-029).
  security-definer-search-path:
    name: SECURITY DEFINER must pin search_path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint supabase/migrations/**.sql
        run: node scripts/lint-security-definer.mjs
