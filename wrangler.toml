# Cloudflare Worker + Static Assets configuration for GroupsMix.
#
# Deployment target: Cloudflare Workers with Static Assets.
#
# This file is the AUTHORITATIVE config for bindings, cron triggers,
# and compatibility flags — unlike the previous Pages setup, Workers
# fully consumes `wrangler.toml`. KV namespace IDs are still left
# blank in source (they are environment-specific); populate them via
# the Cloudflare dashboard (Workers & Pages → groupsmix → Settings →
# Variables → KV namespace bindings) or via `wrangler kv namespace`.
#
# See also:
#   - src/worker.js                    — Worker entry point + route table
#   - RUNBOOK.md                       — day-to-day operations
#   - DISASTER_RECOVERY.md             — restore and cutover
#   - docs/backups.md                  — backup policy
#   - docs/slos.md                     — SLOs + error budgets
#   - docs/observability.md            — Sentry + Logpush
#   - .env.example                     — full env var list with comments
#
# Migration history: this project was migrated from Cloudflare Pages
# (pages_build_output_dir + functions/ directory routing) to Cloudflare
# Workers + Static Assets while the site was pre-launch. The handler
# modules under `functions/` are kept intact; `src/worker.js` adapts
# their Pages-style context object to the Worker runtime.

name = "groupsmix"
main = "src/worker.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ──────────────────────────────────────────────────────────────────────
# Static assets
# ──────────────────────────────────────────────────────────────────────
#
# `astro build` emits the site to ./dist. The Workers runtime serves
# any matching file directly and only invokes the Worker for paths
# that don't match a static asset, which is exactly the behaviour we
# want — static HTML/CSS/JS/sw.js go straight to the edge, and the
# Worker takes over for `/api/*`, `/gm-ctrl-x7`, `/sitemap.xml`, and
# any unmatched path.
#
# `not_found_handling = "404-page"` tells the Assets runtime to return
# the Astro-generated dist/404.html for unmatched paths (with status
# 404), which is identical to Pages' default behaviour.

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"

# ──────────────────────────────────────────────────────────────────────
# KV namespaces
# ──────────────────────────────────────────────────────────────────────
#
# IDs are environment-specific (prod / preview) and therefore left
# blank in source — populate them via the Cloudflare dashboard or
# `wrangler kv namespace create`. The binding NAMES below must match
# the strings the code reads from `env` at runtime.
#
#   STORE_KV      — caches LemonSqueezy product catalog
#                   used by functions/api/lemonsqueezy.js
#   RATE_LIMIT_KV — persistent rate-limit state with in-memory fallback
#                   used by functions/api/_shared/rate-limit.js
#
# After creating the namespaces, uncomment the blocks below and fill
# in the `id` / `preview_id` fields with the generated IDs.

# KV namespace IDs are environment-specific and MUST be populated via
# `wrangler kv namespace create` (or the Cloudflare dashboard) and then
# committed as real IDs, or injected at deploy time. Do NOT commit
# placeholder IDs here — `wrangler deploy` validates them against the
# account and will fail the Cloudflare Pages / Workers build.
#
# [[kv_namespaces]]
# binding    = "STORE_KV"
# id         = "<prod-namespace-id>"
# preview_id = "<preview-namespace-id>"
#
# [[kv_namespaces]]
# binding    = "RATE_LIMIT_KV"
# id         = "<prod-namespace-id>"
# preview_id = "<preview-namespace-id>"

# ──────────────────────────────────────────────────────────────────────
# Environment variables
# ──────────────────────────────────────────────────────────────────────
#
# Secrets MUST be set via `wrangler secret put <NAME>` (or the
# dashboard: Workers & Pages → groupsmix → Settings → Variables →
# Secrets), NEVER in this file. They are listed here only so
# reviewers can see what the code expects at runtime. Any
# addition/rename in code MUST land in the same PR as an update here.
#
# Required:
#   SUPABASE_URL                  Supabase project URL
#   SUPABASE_ANON_KEY             Supabase public anon key
#   SUPABASE_SERVICE_KEY          Supabase service role key (server only)
#   TURNSTILE_SECRET_KEY          Cloudflare Turnstile secret key
#   GROQ_API_KEY                  Groq AI endpoints
#   OPENROUTER_API_KEY            OpenRouter AI endpoints
#   LEMONSQUEEZY_API_KEY          LemonSqueezy server API
#   LEMONSQUEEZY_STORE_ID         LemonSqueezy store
#   LEMONSQUEEZY_WEBHOOK_SECRET   REQUIRED; webhook fails closed without it
#   CRON_SECRET                   REQUIRED; every cron endpoint fails
#                                 closed without it (see H-7)
#
# Optional:
#   RESEND_API_KEY                Contact form email delivery
#   CONTACT_EMAIL_TO              Contact form destination address
#   SENTRY_DSN_EDGE               Server-side Sentry DSN
#   SENTRY_ENVIRONMENT            production | preview | development
#   SENTRY_RELEASE                Matches PUBLIC_SENTRY_RELEASE
#   AI_QUOTA_DAILY_LIMIT          Integer override for the per-user daily
#                                 AI quota (F-017 / E-4). Defaults to 100
#                                 units; each tool has a weight — see
#                                 functions/api/_shared/ai-quota.js. The
#                                 counter is stored in RATE_LIMIT_KV under
#                                 `aiq:{userId}:{YYYY-MM-DD}` and resets
#                                 at UTC midnight.
#
# Build-time (public, exposed to browser — set as a build-time env
# var on the Workers Build pipeline or in CI, consumed by
# scripts/stamp-supabase-config.js at build):
#   PUBLIC_SUPABASE_URL
#   PUBLIC_SUPABASE_ANON_KEY
#   PUBLIC_SENTRY_DSN
#   PUBLIC_GA4_ID
#   PUBLIC_SENTRY_RELEASE
#   PUBLIC_ENVIRONMENT

# ──────────────────────────────────────────────────────────────────────
# Cron triggers (H-7)
# ──────────────────────────────────────────────────────────────────────
#
# Every cron endpoint is gated on the `X-Cron-Secret` header matching
# `CRON_SECRET`. The handlers fail closed with HTTP 503 when the env
# var is unset (tested in tests/compute-feed.test.js,
# tests/purge-deleted.test.js, tests/newsletter-digest.test.js,
# tests/article-schedule.test.js). Do NOT add a cron here without
# confirming the target endpoint enforces the secret.
#
# Cron syntax is standard UNIX cron (UTC). Keep schedules staggered
# so jobs don't all fire on the top of the hour.
#
# The `scheduled` handler in src/worker.js fans each cron out to the
# matching endpoint using an internal `Request` with the
# `X-Cron-Secret` header populated from `env.CRON_SECRET`. Keep the
# CRON_DISPATCH table in src/worker.js aligned with this list and the
# §Manual cron invocation section of RUNBOOK.md.
#
# Endpoints triggered by these crons:
#
#   /api/compute-feed       Feed scoring, collaborative filtering,
#                           embeddings (POST, body `{}`)
#   /api/article-schedule   Publish articles whose scheduled_at has
#                           passed (GET)
#   /api/newsletter-digest  Weekly digest queueing (GET)
#   /api/purge-deleted      Hard-delete soft-deleted users past their
#                           grace window (POST)
#
# When you add a new cron, also add a stanza to RUNBOOK.md §Manual
# cron invocation so on-call knows how to trigger it by hand, and
# extend CRON_DISPATCH in src/worker.js.

[triggers]
crons = [
    # Feed algorithm — trending scores, every 30 minutes
    "*/30 * * * *",
    # Scheduled article publishing — every 15 minutes (was 5m, reduced to save costs)
    "*/15 * * * *",
    # Weekly newsletter digest — Mondays at 13:00 UTC
    "0 13 * * 1",
    # Hard-delete soft-deleted users past their grace window — daily 03:17 UTC
    "17 3 * * *"
]

# ──────────────────────────────────────────────────────────────────────
# Observability
# ──────────────────────────────────────────────────────────────────────
#
# Capture request/invocation logs so Logpush (docs/observability.md)
# and `wrangler tail` see the full handler activity. Head-sampling at
# 10% to prevent cost explosion at scale.

[observability]
enabled = true
head_sampling_rate = 0.1

[env.staging]
name = "groupsmix-staging"
route = { pattern = "staging.groupsmix.com/*", zone_name = "groupsmix.com" }

[env.staging.observability]
enabled = true
head_sampling_rate = 1.0

[[env.staging.kv_namespaces]]
binding    = "STORE_KV"
id         = "staging_store_kv_id"

[[env.staging.kv_namespaces]]
binding    = "RATE_LIMIT_KV"
id         = "staging_rate_limit_kv_id"
