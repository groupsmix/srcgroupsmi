<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Business Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .stat-card h3 {
            font-size: 1.2em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .number {
            font-size: 3em;
            font-weight: bold;
        }

        .add-task-section {
            background: #f8f9ff;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .add-task-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1em;
            transition: border 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .progress-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .tasks-section {
            margin-top: 30px;
        }

        .tasks-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .task-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .task-card:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .task-card.completed {
            background: #e8f5e9;
            border-color: #4caf50;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .task-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .task-card.completed .task-title {
            color: #4caf50;
            text-decoration: line-through;
        }

        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 30px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .task-card.completed .progress-bar {
            background: linear-gradient(90deg, #4caf50 0%, #45a049 100%);
        }

        .task-notes {
            background: #fff9e6;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #ffc107;
            font-size: 1.05em;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .task-actions button {
            flex: 1;
            padding: 10px;
            font-size: 1em;
        }

        .btn-complete {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
        }

        .btn-delete {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
        }

        .btn-update {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 1.3em;
        }

        @media (max-width: 768px) {
            .progress-inputs {
                grid-template-columns: 1fr;
            }
            
            .task-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 My Business Task Manager</h1>

        <!-- Dashboard Stats -->
        <div class="dashboard">
            <div class="stat-card">
                <h3>Total Tasks</h3>
                <div class="number" id="totalTasks">0</div>
            </div>
            <div class="stat-card">
                <h3>Completed</h3>
                <div class="number" id="completedTasks">0</div>
            </div>
            <div class="stat-card">
                <h3>In Progress</h3>
                <div class="number" id="inProgressTasks">0</div>
            </div>
            <div class="stat-card">
                <h3>Overall Progress</h3>
                <div class="number" id="overallProgress">0%</div>
            </div>
        </div>

        <!-- Add Task Section -->
        <div class="add-task-section">
            <h2>➕ Add New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label>Task Name:</label>
                    <input type="text" id="taskName" placeholder="e.g., Create Marketing Videos" required>
                </div>

                <div class="form-group">
                    <label>Notes:</label>
                    <textarea id="taskNotes" placeholder="Add any notes or details about this task..."></textarea>
                </div>

                <div class="form-group">
                    <label>Progress Tracking:</label>
                    <div class="progress-inputs">
                        <div>
                            <label>Completed:</label>
                            <input type="number" id="taskCompleted" min="0" value="0" required>
                        </div>
                        <div>
                            <label>Target:</label>
                            <input type="number" id="taskTarget" min="1" value="1" required>
                        </div>
                    </div>
                </div>

                <button type="submit">Add Task</button>
            </form>
        </div>

        <!-- Tasks List -->
        <div class="tasks-section">
            <h2>📋 My Tasks</h2>
            <div id="tasksList"></div>
        </div>
    </div>

    <script>
        // Load tasks from localStorage
        let tasks = JSON.parse(localStorage.getItem('businessTasks')) || [];

        // Update dashboard statistics
        function updateDashboard() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed >= t.target).length;
            const inProgress = total - completed;
            
            let overallCompleted = 0;
            let overallTarget = 0;
            
            tasks.forEach(task => {
                overallCompleted += task.completed;
                overallTarget += task.target;
            });
            
            const overallPercent = overallTarget > 0 ? Math.round((overallCompleted / overallTarget) * 100) : 0;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('inProgressTasks').textContent = inProgress;
            document.getElementById('overallProgress').textContent = overallPercent + '%';
        }

        // Save tasks to localStorage
        function saveTasks() {
            localStorage.setItem('businessTasks', JSON.stringify(tasks));
            updateDashboard();
            renderTasks();
        }

        // Add new task
        document.getElementById('taskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const task = {
                id: Date.now(),
                name: document.getElementById('taskName').value,
                notes: document.getElementById('taskNotes').value,
                completed: parseInt(document.getElementById('taskCompleted').value),
                target: parseInt(document.getElementById('taskTarget').value)
            };

            tasks.push(task);
            saveTasks();
            
            // Reset form
            this.reset();
        });

        // Render all tasks
        function renderTasks() {
            const tasksList = document.getElementById('tasksList');
            
            if (tasks.length === 0) {
                tasksList.innerHTML = '<div class="empty-state">No tasks yet. Add your first task above! 🚀</div>';
                return;
            }

            tasksList.innerHTML = tasks.map(task => {
                const percentage = Math.round((task.completed / task.target) * 100);
                const isComplete = task.completed >= task.target;
                
                return `
                    <div class="task-card ${isComplete ? 'completed' : ''}">
                        <div class="task-header">
                            <div class="task-title">${task.name}</div>
                        </div>
                        
                        ${task.notes ? `<div class="task-notes">📝 ${task.notes}</div>` : ''}
                        
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width: ${Math.min(percentage, 100)}%">
                                ${task.completed} / ${task.target} (${percentage}%)
                            </div>
                        </div>

                        <div class="task-actions">
                            <button class="btn-update" onclick="incrementProgress(${task.id})">
                                ➕ Add Progress
                            </button>
                            <button class="btn-update" onclick="decrementProgress(${task.id})">
                                ➖ Reduce Progress
                            </button>
                            <button class="btn-delete" onclick="deleteTask(${task.id})">
                                🗑️ Delete
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Increment progress
        function incrementProgress(id) {
            const task = tasks.find(t => t.id === id);
            if (task && task.completed < task.target) {
                task.completed++;
                saveTasks();
            }
        }

        // Decrement progress
        function decrementProgress(id) {
            const task = tasks.find(t => t.id === id);
            if (task && task.completed > 0) {
                task.completed--;
                saveTasks();
            }
        }

        // Delete task
        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
            }
        }

        // Initial render
        updateDashboard();
        renderTasks();
    </script>
</body>
</html>
